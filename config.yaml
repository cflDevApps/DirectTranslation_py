audio:
  device: null          # null = dispositivo padrão do sistema; trocar pelo índice (ex: 2) se necessário
  sample_rate: 16000
  chunk_duration: 2.5
  overlap_duration: 0.25
  energy_threshold: 0.0015
  silence_timeout: 1.0

asr:
  model_size: medium
  source_language: pt
  device: cuda
  compute_type: int8_float16
  cpu_threads: 4
  num_workers: 2

translation:
  source_language: pt
  target_language: en

tts:
  model_path: src/models/en_US-lessac-medium.onnx
  piper_path: piper

gpu:
  device: cuda
  fallback_to_cpu: true
